name: Validate PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'lists/**'
      - 'lotls/**'
      - 'tsls/**'
      - 'pipelines/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install tsl-tool
        uses: sirosfoundation/g119612@v0.3.2

      - name: Validate trust list pipelines
        run: |
          set -euo pipefail
          failed=0

          for dir in lists/*/ tsls/*/ lotls/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")

            if [ ! -f "$dir/.pipeline.yaml" ]; then
              echo "::warning::Skipping $name — no .pipeline.yaml"
              continue
            fi

            echo "::group::Validating $name"
            tmpdir=$(mktemp -d)
            pipeline=$(mktemp --suffix=.yaml)
            # Expand with empty signing params — publish steps tolerate unsigned mode
            OUTPUT_DIR="$tmpdir" LIST_DIR="$dir" \
              PKCS11_URI="" PKCS11_KEY_LABEL="" PKCS11_CERT_LABEL="" PKCS11_KEY_ID="" \
              envsubst < "$dir/.pipeline.yaml" > "$pipeline"
            # Strip empty signing args so publish steps run unsigned
            sed -i '/^[[:space:]]*- ""$/d' "$pipeline"
            echo "Pipeline content:"
            cat "$pipeline"
            if tsl-tool "$pipeline"; then
              echo "✓ $name validated successfully"
              ls -la "$tmpdir"
            else
              echo "::error::$name failed validation"
              failed=1
            fi
            rm -rf "$tmpdir" "$pipeline"
            echo "::endgroup::"
          done
          exit $failed

      - name: Validate custom pipelines
        run: |
          set -euo pipefail
          for p in pipelines/*.yaml; do
            [ -f "$p" ] || continue
            name=$(basename "$p")
            echo "::group::Validating pipeline $name"
            pipeline=$(mktemp --suffix=.yaml)
            envsubst < "$p" > "$pipeline"
            tsl-tool "$pipeline"
            rm -f "$pipeline"
            echo "::endgroup::"
          done
